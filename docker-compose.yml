version: "3.9"

services:

  db:
    image: postgres:16
    container_name: ecommerce_db
    restart: always
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    container_name: ecommerce_backend
    restart: always
    env_file:
      - ./Backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./Backend:/app

  frontend:
    build:
      context: ./Frontend
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./Frontend:/app
      - /app/node_modules

volumes:
  postgres_data: